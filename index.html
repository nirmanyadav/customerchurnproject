<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Churn Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding-top: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header-box { background: #007bff; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="header-box text-center">
                        <h3>Customer Analysis</h3>
                    </div>
                    <div class="card-body p-4">
                        <form action="/predict" method="POST">
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Tenure (Months)</label>
                                    <input type="number" name="tenure" class="form-control" value="12" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Contract Type</label>
                                    <select name="contract" class="form-select">
                                        <option value="0">Month-to-month</option>
                                        <option value="1">One Year</option>
                                        <option value="2">Two Year</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Internet Service</label>
                                    <select name="internet" class="form-select">
                                        <option value="0">DSL</option>
                                        <option value="1">Fiber Optic</option>
                                        <option value="2">No Internet</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Monthly Charges ($)</label>
                                    <input type="number" step="0.01" name="monthly_charges" class="form-control" value="65.00" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Total Charges ($)</label>
                                    <input type="number" step="0.01" name="total_charges" class="form-control" value="150.00" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-3">Run AI Prediction</button>
                        </form>

                        {% if prediction_text %}
                        <div class="mt-4 alert alert-{{ alert_class }} text-center">
                            {{ prediction_text }}
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
